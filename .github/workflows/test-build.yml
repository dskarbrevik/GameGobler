name: Test Build

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build"
        type: choice
        default: all
        options:
          - all
          - macos
          - linux
          - windows

permissions:
  contents: read

jobs:
  prep:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      sidecar-matrix: ${{ steps.set.outputs.sidecar }}
      tauri-matrix: ${{ steps.set.outputs.tauri }}
    steps:
      - id: set
        run: |
          if [ "${{ inputs.platforms }}" = "all" ]; then
            SIDECAR='{"include":[{"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","sidecar":"gamegobler-api-x86_64-unknown-linux-gnu"},{"os":"macos-latest","target":"aarch64-apple-darwin","sidecar":"gamegobler-api-aarch64-apple-darwin"},{"os":"windows-latest","target":"x86_64-pc-windows-msvc","sidecar":"gamegobler-api-x86_64-pc-windows-msvc.exe"}]}'
            TAURI='{"include":[{"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"},{"os":"macos-latest","target":"aarch64-apple-darwin"},{"os":"windows-latest","target":"x86_64-pc-windows-msvc"}]}'
          elif [ "${{ inputs.platforms }}" = "linux" ]; then
            SIDECAR='{"include":[{"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","sidecar":"gamegobler-api-x86_64-unknown-linux-gnu"}]}'
            TAURI='{"include":[{"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}]}'
          elif [ "${{ inputs.platforms }}" = "macos" ]; then
            SIDECAR='{"include":[{"os":"macos-latest","target":"aarch64-apple-darwin","sidecar":"gamegobler-api-aarch64-apple-darwin"}]}'
            TAURI='{"include":[{"os":"macos-latest","target":"aarch64-apple-darwin"}]}'
          elif [ "${{ inputs.platforms }}" = "windows" ]; then
            SIDECAR='{"include":[{"os":"windows-latest","target":"x86_64-pc-windows-msvc","sidecar":"gamegobler-api-x86_64-pc-windows-msvc.exe"}]}'
            TAURI='{"include":[{"os":"windows-latest","target":"x86_64-pc-windows-msvc"}]}'
          fi
          echo "sidecar=$SIDECAR" >> "$GITHUB_OUTPUT"
          echo "tauri=$TAURI" >> "$GITHUB_OUTPUT"

  build-sidecar:
    name: Sidecar – ${{ matrix.os }}
    needs: prep
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.prep.outputs.sidecar-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npx vite build

      - name: Package backend with PyInstaller
        run: uv run pyinstaller gamegobler.spec --noconfirm

      - name: Place sidecar binary
        shell: bash
        run: |
          mkdir -p web/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/GameGobler.exe "web/src-tauri/binaries/${{ matrix.sidecar }}"
          else
            cp dist/GameGobler "web/src-tauri/binaries/${{ matrix.sidecar }}"
            chmod +x "web/src-tauri/binaries/${{ matrix.sidecar }}"
          fi

      - name: Upload sidecar
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: web/src-tauri/binaries/${{ matrix.sidecar }}

  build-tauri:
    name: Tauri – ${{ matrix.os }}
    needs: [prep, build-sidecar]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.prep.outputs.tauri-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: web/src-tauri/binaries/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x web/src-tauri/binaries/*

      - name: Build Tauri app
        working-directory: web
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.target }}
          path: |
            web/src-tauri/target/release/bundle/**/*.dmg
            web/src-tauri/target/release/bundle/**/*.app
            web/src-tauri/target/release/bundle/**/*.msi
            web/src-tauri/target/release/bundle/**/*.AppImage
            web/src-tauri/target/release/bundle/**/*.deb
          retention-days: 7

  smoke-test:
    name: Smoke test – ${{ matrix.os }}
    needs: [prep, build-tauri]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prep.outputs.tauri-matrix) }}
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-${{ matrix.target }}
          path: artifact/

      - name: List artifacts
        shell: bash
        run: find artifact/ -type f | head -30

      # ── Linux: extract AppImage and run ──
      - name: "Linux: install deps & launch app"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev

          APPIMAGE=$(find artifact/ -name '*.AppImage' | head -1)
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract
          xvfb-run --auto-servernum squashfs-root/gamegobler-tauri &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"

      # ── macOS: mount DMG and launch ──
      - name: "macOS: mount DMG & launch app"
        if: runner.os == 'macOS'
        run: |
          DMG=$(find artifact/ -name '*.dmg' | head -1)
          hdiutil attach "$DMG" -nobrowse -noverify
          APP=$(find /Volumes -name 'GameGobler.app' -maxdepth 2 | head -1)
          open -a "$APP" --args --headless 2>/dev/null || "$APP/Contents/MacOS/gamegobler-tauri" &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"

      # ── Windows: install MSI silently and launch ──
      - name: "Windows: install MSI & launch app"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path artifact -Recurse -Filter '*.msi' | Select-Object -First 1
          Write-Host "Installing $($msi.FullName)"
          Start-Process msiexec -ArgumentList "/i `"$($msi.FullName)`" /quiet /norestart" -Wait
          $exe = Get-ChildItem -Path "$env:LOCALAPPDATA\Programs" -Recurse -Filter 'gamegobler-tauri.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter 'gamegobler-tauri.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          Write-Host "Launching $($exe.FullName)"
          $proc = Start-Process -FilePath $exe.FullName -PassThru
          echo "APP_PID=$($proc.Id)" >> $env:GITHUB_ENV

      # ── Health check (all platforms) ──
      - name: Wait for backend health
        shell: bash
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "✓ /api/health responded after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "✗ Backend did not respond within 60s"
          exit 1

      - name: Verify API endpoints
        shell: bash
        run: |
          echo "── /api/health ──"
          curl -sf http://127.0.0.1:8000/api/health | tee /dev/stderr | grep -q "ok"
          echo ""

          echo "── /api/version ──"
          curl -sf http://127.0.0.1:8000/api/version | tee /dev/stderr | grep -q "version"
          echo ""

          echo "── /api/settings ──"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/api/settings)
          echo "Status: $STATUS"
          [ "$STATUS" -eq 200 ]

          echo ""
          echo "✓ All smoke tests passed"

      # ── Cleanup ──
      - name: Stop app (Linux/macOS)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          if [ -n "$APP_PID" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi
          pkill -f gamegobler-api 2>/dev/null || true

      - name: Stop app (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:APP_PID) {
            Stop-Process -Id $env:APP_PID -Force -ErrorAction SilentlyContinue
          }
          Get-Process -Name 'gamegobler*' -ErrorAction SilentlyContinue | Stop-Process -Force
