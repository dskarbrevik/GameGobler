<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Game controller body -->
  <g transform="translate(256,270)" fill="#fff">
    <!-- Main body -->
    <ellipse rx="140" ry="80" fill="#fff" opacity="0.95"/>
    <!-- Left grip -->
    <ellipse cx="-110" cy="30" rx="50" ry="65" fill="#fff" opacity="0.95"/>
    <!-- Right grip -->
    <ellipse cx="110" cy="30" rx="50" ry="65" fill="#fff" opacity="0.95"/>
    <!-- D-pad vertical -->
    <rect x="-80" y="-18" width="22" height="36" rx="4" fill="#6366f1"/>
    <!-- D-pad horizontal -->
    <rect x="-91" y="-7" width="44" height="14" rx="4" fill="#6366f1"/>
    <!-- Button A -->
    <circle cx="70" cy="-12" r="12" fill="#34d399"/>
    <!-- Button B -->
    <circle cx="95" cy="6" r="12" fill="#f87171"/>
    <!-- Button X -->
    <circle cx="45" cy="6" r="12" fill="#fbbf24"/>
    <!-- Button Y -->
    <circle cx="70" cy="24" r="12" fill="#818cf8"/>
  </g>
  <!-- "GG" text -->
  <text x="256" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="80" fill="#fff" opacity="0.95">GG</text>
</svg>
